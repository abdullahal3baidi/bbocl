<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة الراتب والمباشرة</title>
    
    <!-- استدعاء Tailwind CSS للتصميم -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- استدعاء مكتبات React -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- استدعاء Babel لترجمة أكواد React للمتصفح -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <!-- العنصر الذي سيتم عرض التطبيق بداخله -->
    <div id="root"></div>

    <!-- كود React الخاص بك -->
    <script type="text/babel">
      // استخراج useState من React (بدلاً من import)
      const { useState } = React;

      function App() {
        // القيمة الافتراضية 1 
        const [days, setDays] = useState(1);

        // ثوابت القيم اليومية بناءً على الصورة (مقربة لـ 3 خانات عشرية)
        const baseDaily = 183.333;
        const allowance1Daily = 45.833;
        const allowance2Daily = 18.333;
        const fullMonthNet = 6756.75; // الراتب الصافي الثابت للشهر الكامل

        // --- العمليات الحسابية ---
        const part1 = baseDaily * days;
        const part2 = allowance1Daily * days;
        const step1_total = part1 + part2;

        const gosi_deduction = step1_total * 0.09;

        const part3 = allowance2Daily * days;
        const salary_for_days = step1_total + part3;

        const final_total = fullMonthNet + salary_for_days;

        // دوال زيادة ونقصان الأيام
        const incrementDays = () => setDays((prev) => Math.min(31, prev + 1));
        const decrementDays = () => setDays((prev) => Math.max(1, prev - 1));

        return (
          <div className="min-h-screen bg-gray-200 flex flex-col items-center justify-center p-4 font-sans" dir="rtl">
            
            <div className="bg-[#EAEAEA] w-full max-w-2xl rounded-2xl shadow-xl overflow-hidden text-gray-800 mb-4">
              
              {/* Header / Input Section */}
              <div className="bg-white p-6 border-b border-gray-300">
                <h1 className="text-2xl font-bold mb-6 text-center text-gray-800">حاسبة الراتب والمباشرة</h1>
                <div className="flex flex-col sm:flex-row items-center justify-center gap-4">
                  <label className="text-lg font-semibold text-gray-700">عدد أيام المباشرة:</label>
                  
                  {/* أزرار الأسهم ومربع الإدخال */}
                  <div className="flex items-center bg-gray-50 border-2 border-blue-400 rounded-xl overflow-hidden shadow-sm">
                    <button 
                      onClick={incrementDays}
                      className="p-3 bg-blue-100 hover:bg-blue-200 text-blue-700 transition-colors focus:outline-none focus:bg-blue-300"
                      aria-label="زيادة"
                    >
                      <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    </button>
                    
                    <input
                      type="number"
                      min="1"
                      max="31"
                      value={days}
                      onChange={(e) => {
                        const val = parseInt(e.target.value);
                        setDays(isNaN(val) ? 1 : val);
                      }}
                      className="w-16 text-center text-2xl font-bold p-2 focus:outline-none bg-transparent [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none text-blue-800"
                    />
                    
                    <button 
                      onClick={decrementDays}
                      className="p-3 bg-blue-100 hover:bg-blue-200 text-blue-700 transition-colors focus:outline-none focus:bg-blue-300"
                      aria-label="نقصان"
                    >
                      <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20 12H4"></path></svg>
                    </button>
                  </div>

                </div>
              </div>

              {/* Calculations Section */}
              <div className="p-6 md:p-10 space-y-8 text-lg md:text-xl font-medium tracking-wide">
                
                {/* Daily Rates */}
                <div className="space-y-1 text-gray-700">
                  <p>5500 ÷ 30 = <span className="text-blue-500">183.333</span></p>
                  <p>1375 ÷ 30 = <span className="text-blue-500">45.833</span></p>
                  <p>550 ÷ 30 = <span className="text-blue-500">18.333</span></p>
                </div>

                {/* Gross for Days & GOSI */}
                <div className="space-y-3">
                  <p className="text-gray-700">
                    ({baseDaily} × {days}) + ({allowance1Daily} × {days}) = <span className="text-blue-500">{step1_total.toFixed(3)}</span>
                  </p>
                  <div className="flex flex-wrap items-center gap-2">
                    <p>
                      {step1_total.toFixed(3)} × 9% = <span className="text-teal-600 bg-teal-100/60 px-1.5 py-0.5 rounded">{gosi_deduction.toFixed(3)}</span>
                    </p>
                    <div className="flex items-center text-gray-600 text-sm md:text-base mr-2 md:mr-4 border-r-2 border-green-400 pr-2">
                      نفس الخصم في تأميناتي
                    </div>
                  </div>
                </div>

                {/* Salary for the specific days */}
                <div className="flex flex-wrap items-center gap-2">
                  <p>
                    {step1_total.toFixed(3)} + ({allowance2Daily} × {days}) = <span className="text-teal-600 bg-teal-100/60 px-1.5 py-0.5 rounded">{salary_for_days.toFixed(3)}</span>
                  </p>
                  <div className="flex items-center text-gray-600 text-sm md:text-base mr-2 md:mr-4 border-r-2 border-green-400 pr-2">
                     راتب الـ {days} أيام اللي باشرتها
                  </div>
                </div>

                {/* Full month regular calculations */}
                <div className="flex flex-col md:flex-row gap-4 md:gap-8 pt-4">
                  <p>7425 × 9% = <span className="text-blue-500">668.25</span></p>
                  <div className="flex flex-wrap items-center gap-2">
                    <p>7425 - 668.25 = <span className="text-teal-600 bg-teal-100/60 px-1.5 py-0.5 rounded">6756.75</span></p>
                    <div className="flex items-center text-gray-600 text-sm md:text-base mr-2 border-r-2 border-green-400 pr-2">
                       راتبنا الصافي كل شهر
                    </div>
                  </div>
                </div>

                {/* Final Total */}
                <div className="flex flex-wrap items-center gap-2 pt-6 mt-4 font-bold text-xl md:text-2xl border-t-2 border-gray-300">
                  <p>
                    {fullMonthNet} + {salary_for_days.toFixed(3)} = <span className="text-teal-700 bg-teal-200/60 px-2 py-1 rounded shadow-sm">{final_total.toFixed(3)}</span>
                  </p>
                  <div className="flex items-center text-gray-700 text-base md:text-lg mr-2 md:mr-4 border-r-4 border-green-500 pr-2">
                     راتب الشهر + {days} أيام
                  </div>
                </div>

              </div>
            </div>

            {/* حقوق النشر */}
            <div className="text-gray-500 text-sm mt-2 font-medium tracking-wide">
              Developed by <span className="font-bold text-gray-600">Abdullah Alharbi</span>
            </div>

          </div>
        );
      }

      // تشغيل التطبيق وربطه بـ div
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
</body>
</html>
